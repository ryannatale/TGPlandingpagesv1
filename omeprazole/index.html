<iframe id="frame"></iframe>
<script>

// ============================================================
// TO SWAP YOUR INTAKE URL: edit the line below only.
// Change the URL, commit on GitHub — live in 30 seconds.
// ============================================================
var INTAKE_URL = "https://go.thegastronomyproject.com/start-online-visit/gs1-gs2";
// ============================================================

var DESKTOP_FILE = "desktop.html";
var MOBILE_FILE  = "mobile.html";

// --- Lead event handler (called from blob iframe via window.top) ---
window.tgpCta = function() {
  if (!sessionStorage.getItem('tgp_lead_fired')) {
    sessionStorage.setItem('tgp_lead_fired', '1');
    if (navigator.sendBeacon) {
      navigator.sendBeacon(
        'https://www.facebook.com/tr/',
        new URLSearchParams({
          id: '26074870975478586',
          ev: 'Lead',
          dl: window.location.href,
          rl: document.referrer,
          ts: String(Date.now()),
          noscript: '1'
        })
      );
    }
    if (typeof fbq === 'function') {
      fbq('track', 'Lead');
    }
  }
  window.location.href = INTAKE_URL;
};

function load() {
  var frame = document.getElementById('frame');
  var isDesktop = window.innerWidth >= 1024;
  var file = isDesktop ? DESKTOP_FILE : MOBILE_FILE;

  frame.setAttribute('scrolling', 'yes');

  fetch(file)
    .then(function(r) {
      if (!r.ok) throw new Error('Failed to load ' + file + ': ' + r.status);
      return r.text();
    })
    .then(function(html) {
      html = html.replace(
        /(<button[^>]*class="cta[^"]*") onclick="[^"]*"/g,
        '$1'
      );
      html = html.replace(
        /(<button[^>]*class="cta[^"]*")/g,
        '$1 onclick="window.top.tgpCta();return false;"'
      );
      html = html.replace(
        /(<div[^>]*class="quiz-strip[^"]*")/g,
        '$1 onclick="window.top.location.href=\'' + INTAKE_URL + '\'" style="cursor:pointer;"'
      );
      var blob = new Blob([html], { type: 'text/html; charset=utf-8' });
      frame.src = URL.createObjectURL(blob);
    })
    .catch(function(err) {
      console.error(err);
      document.body.innerHTML = '<p style="padding:2rem;font-family:sans-serif;">Something went wrong loading the page. Please refresh.</p>';
    });
}

load();

var lastWidth = window.innerWidth;
window.addEventListener('resize', function() {
  var newWidth = window.innerWidth;
  if ((lastWidth >= 1024) !== (newWidth >= 1024)) {
    lastWidth = newWidth;
    load();
  }
});
</script>
</body>
</html>
