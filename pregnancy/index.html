<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pregnancy GI Support &#8212; The Gastronomy Project</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#F5F0E8; }
  iframe { border:none; margin:0; padding:0; display:block; position:fixed; top:0; left:0; width:100%; height:100%; }
</style>
</head>
<body>
<iframe id="frame"></iframe>
<script>

// ============================================================
// TO SWAP YOUR INTAKE URL: edit the line below only.
// Change the URL, commit on GitHub — live in 30 seconds.
// ============================================================
var INTAKE_URL = "https://go.thegastronomyproject.com/start-online-visit/main";
// ============================================================

var DESKTOP_FILE = "desktop.html";
var MOBILE_FILE  = "mobile.html";

function load() {
  var frame = document.getElementById('frame');
  var isDesktop = window.innerWidth >= 1024;
  var file = isDesktop ? DESKTOP_FILE : MOBILE_FILE;
  frame.setAttribute('scrolling', isDesktop ? 'no' : 'yes');

  fetch(file)
    .then(function(r) { return r.text(); })
    .then(function(html) {
      html = html.replace(
        /(<button[^>]*class="cta[^"]*")/g,
        '$1 onclick="window.top.location.href=\'' + INTAKE_URL + '\'"'
      );
      html = html.replace(
        /(<div[^>]*class="quiz-strip[^"]*")/g,
        '$1 onclick="window.top.location.href=\'' + INTAKE_URL + '\'" style="cursor:pointer;"'
      );
      var blob = new Blob([html], {type: 'text/html; charset=utf-8'});
      frame.src = URL.createObjectURL(blob);
    })
    .catch(function(e) { console.error('Failed to load:', file, e); });
}

load();

var lastWidth = window.innerWidth;
window.addEventListener('resize', function() {
  var newWidth = window.innerWidth;
  if ((lastWidth >= 1024) !== (newWidth >= 1024)) {
    lastWidth = newWidth;
    load();
  }
});
</script>
</body>
</html>
