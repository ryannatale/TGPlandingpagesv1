<iframe id="frame"></iframe>
<script>
// ============================================================
// TO SWAP YOUR INTAKE URL: edit the line below only.
// Change the URL, commit on GitHub — live in 30 seconds.
// ============================================================
var INTAKE_URL = "https://go.thegastronomyproject.com/start-online-visit/mastic";
// ============================================================
var DESKTOP_FILE = "desktop.html";
var MOBILE_FILE  = "mobile.html";
function load() {
  var frame = document.getElementById('frame');
  var isDesktop = window.innerWidth >= 1024;
  var file = isDesktop ? DESKTOP_FILE : MOBILE_FILE;
  frame.setAttribute('scrolling', isDesktop ? 'no' : 'yes');
  fetch(file)
    .then(function(r) { return r.text(); })
    .then(function(html) {
      html = html.replace(/(<button[^>]*class="cta[^"]*")/g,'$1 onclick="window.top.location.href=\'' + INTAKE_URL + '\'"');
      html = html.replace(/(<div[^>]*class="quiz-strip[^"]*")/g,'$1 onclick="window.top.location.href=\'' + INTAKE_URL + '\'" style="cursor:pointer;"');
      var blob = new Blob([html], {type: 'text/html; charset=utf-8'});
      frame.src = URL.createObjectURL(blob);
    })
    .catch(function(e) { console.error('Failed to load:', file, e); });
}
load();
var lastWidth = window.innerWidth;
window.addEventListener('resize', function() {
  var newWidth = window.innerWidth;
  if ((lastWidth >= 1024) !== (newWidth >= 1024)) { lastWidth = newWidth; load(); }
});
</script>
