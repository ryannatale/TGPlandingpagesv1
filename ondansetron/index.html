<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-Pack — The Gastronomy Project</title>
<style>
  /* Reset & full-viewport iframe */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #F5F0E8; }
  #frame {
    display: block;
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-JBRMQV74FG"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-JBRMQV74FG');
</script>
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "umuegpvdmf");
</script>
</head>
<body>
<iframe id="frame"></iframe>
<script>

// ============================================================
// TO SWAP YOUR INTAKE URL: edit the line below only.
// Change the URL, commit on GitHub — live in 30 seconds.
// ============================================================
var INTAKE_URL = "https://go.thegastronomyproject.com/start-online-visit/gpkg-pack";
// ============================================================

var DESKTOP_FILE = "desktop.html";
var MOBILE_FILE  = "mobile.html";

// --- Lead event handler (called from iframe via postMessage) ---
window.addEventListener('message', function(e) {
  if (e.data === 'tgpCta') {
    if (!sessionStorage.getItem('tgp_lead_fired')) {
      sessionStorage.setItem('tgp_lead_fired', '1');
    }
    window.location.href = INTAKE_URL;
  }
});

function load() {
  var frame = document.getElementById('frame');
  var isDesktop = window.innerWidth >= 1024;
  var file = isDesktop ? DESKTOP_FILE : MOBILE_FILE;
  frame.setAttribute('scrolling', 'yes');
  frame.src = file;
}

load();

var lastWidth = window.innerWidth;
window.addEventListener('resize', function() {
  var newWidth = window.innerWidth;
  if ((lastWidth >= 1024) !== (newWidth >= 1024)) {
    lastWidth = newWidth;
    load();
  }
});
</script>
</body>
</html>
